<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>r8r — Actuarial Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3347;
  --text: #e1e4ed;
  --text-dim: #8b90a5;
  --accent: #6c8cff;
  --accent-dim: #4a6ad4;
  --green: #4ade80;
  --red: #f87171;
  --orange: #fb923c;
  --font: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
}

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.header h1 { font-size: 20px; font-weight: 700; color: var(--accent); }
.header .subtitle { color: var(--text-dim); font-size: 12px; }

.layout { display: flex; height: calc(100vh - 57px); }

.sidebar {
  width: 320px; min-width: 320px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto; padding: 16px;
}

.sidebar h2 {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--text-dim); margin-bottom: 12px; margin-top: 20px;
}
.sidebar h2:first-child { margin-top: 0; }

.control { margin-bottom: 10px; }
.control label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 3px; }
.control input[type="number"], .control select {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 6px 8px; border-radius: 4px;
  font-family: var(--font); font-size: 12px;
}
.control input[type="number"]:focus, .control select:focus { outline: none; border-color: var(--accent); }

.control-row { display: flex; gap: 8px; }
.control-row .control { flex: 1; }

.pct-suffix { position: relative; }
.pct-suffix input { padding-right: 24px; }
.pct-suffix::after { content: '%'; position: absolute; right: 8px; bottom: 7px; color: var(--text-dim); font-size: 11px; }

.btn {
  display: block; width: 100%; padding: 10px; background: var(--accent); color: #fff;
  border: none; border-radius: 6px; font-family: var(--font); font-size: 13px;
  font-weight: 600; cursor: pointer; margin-top: 16px; transition: background 0.15s;
}
.btn:hover { background: var(--accent-dim); }
.btn:disabled { opacity: 0.5; cursor: wait; }

.main { flex: 1; overflow-y: auto; padding: 20px 24px; }

.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap; }
.tab {
  padding: 8px 16px; font-family: var(--font); font-size: 12px; color: var(--text-dim);
  background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.table-wrap { overflow-x: auto; margin-bottom: 24px; }
.table-wrap tbody tr:hover { background: rgba(108, 140, 255, 0.1); }
.selected-trend-row { background: rgba(108, 140, 255, 0.2) !important; }
.selected-trend-row td:first-child { border-left: 3px solid #6c8cff; padding-left: 9px; }
table { border-collapse: collapse; width: 100%; font-size: 12px; }
th, td { padding: 5px 10px; text-align: right; white-space: nowrap; border-bottom: 1px solid var(--border); }
th {
  background: var(--surface2); color: var(--text-dim); font-weight: 600;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0;
}
td:first-child, th:first-child { text-align: left; font-weight: 600; color: var(--accent); }

tr.separator td { border-top: 2px solid var(--accent-dim); padding-top: 8px; }
tr.avg-row td { color: var(--text-dim); }
tr.avg-row td:first-child { color: var(--text-dim); }
tr.selected-row td { color: var(--green); font-weight: 700; }
tr.selected-row td:first-child { color: var(--green); }
tr.cdf-row td { color: var(--orange); font-weight: 700; }
tr.cdf-row td:first-child { color: var(--orange); }

.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.card .card-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 4px; }
.card .card-value { font-size: 20px; font-weight: 700; }
.card .card-value.positive { color: var(--red); }
.card .card-value.negative { color: var(--green); }

.section-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
.empty-state { text-align: center; padding: 80px 20px; color: var(--text-dim); }
.empty-state h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; }

.filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.filter-chip {
  padding: 3px 10px; border-radius: 12px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text-dim); font-size: 11px;
  font-family: var(--font); cursor: pointer; transition: all 0.15s;
}
.filter-chip:hover { border-color: var(--accent); color: var(--text); }
.filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.chart-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 0;
  position: relative;
  height: 380px;
}

.trend-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 20px;
}
.trend-card .chart-container { border: none; padding: 0; margin-bottom: 16px; }
.trend-card .section-title { margin-top: 0; }
.trend-card .table-wrap { margin-bottom: 0; }

.toggle-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.toggle-pill {
  padding: 6px 14px; border-radius: 16px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text-dim); font-size: 12px;
  font-family: var(--font); font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.toggle-pill:hover { border-color: var(--accent); color: var(--text); }
.toggle-pill.on { background: var(--accent); color: #fff; border-color: var(--accent); }

.loading-spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
  border-radius: 50%; animation: spin 0.6s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>r8r</h1>
  <span class="subtitle">Actuarial Analysis Engine — Loss Development, Trends &amp; Rate Indications</span>
</div>

<div class="layout">
  <div class="sidebar">
    <h2>Simulation Parameters</h2>
    <div class="control-row">
      <div class="control"><label>Base Year</label><input type="number" id="base_year" value="2015"></div>
      <div class="control"><label>Years</label><input type="number" id="years" value="10"></div>
    </div>
    <div class="control-row">
      <div class="control"><label>Policy Count</label><input type="number" id="base_policy_count" value="10000"></div>
      <div class="control"><label>Avg Premium</label><input type="number" id="base_premium_per_policy" value="1200" step="50"></div>
    </div>

    <h2>Trend Toggles</h2>
    <div class="control pct-suffix"><label>Frequency Trend (annual)</label><input type="number" id="frequency_trend_annual" value="1.0" step="0.5"></div>
    <div class="control pct-suffix"><label>Severity Trend (annual)</label><input type="number" id="severity_trend_annual" value="4.0" step="0.5"></div>
    <div class="control pct-suffix"><label>Premium Drift (annual)</label><input type="number" id="premium_drift_annual" value="2.0" step="0.5"></div>
    <div class="control pct-suffix"><label>Exposure Growth (annual)</label><input type="number" id="exposure_growth_annual" value="3.0" step="0.5"></div>

    <h2>Severity Distribution</h2>
    <div class="control-row">
      <div class="control"><label>Mean Severity</label><input type="number" id="base_severity_mean" value="15000" step="500"></div>
      <div class="control"><label>CV</label><input type="number" id="severity_cv" value="1.5" step="0.1"></div>
    </div>
    <div class="control"><label>Base Frequency</label><input type="number" id="base_frequency" value="0.08" step="0.01"></div>

    <h2>LDF Selection</h2>
    <div class="control-row">
      <div class="control"><label>Window</label>
        <select id="ldf_window"><option value="all" selected>All</option><option value="4">4Q</option><option value="6">6Q</option><option value="8">8Q</option><option value="12">12Q</option><option value="16">16Q</option></select>
      </div>
      <div class="control"><label>Type</label>
        <select id="ldf_type"><option value="volume_weighted" selected>Volume Wtd</option><option value="simple">Simple</option></select>
      </div>
    </div>
    <div class="control-row">
      <div class="control"><label>Variant</label>
        <select id="ldf_variant"><option value="straight" selected>Straight</option><option value="hi-lo">Hi-Lo</option></select>
      </div>
      <div class="control"><label>Tail Factor</label><input type="number" id="tail_factor" value="1.000" step="0.005"></div>
    </div>

    <h2>Indication Inputs</h2>
    <div class="control-row">
      <div class="control pct-suffix"><label>Expense Ratio</label><input type="number" id="expense_ratio" value="30.0" step="1"></div>
      <div class="control pct-suffix"><label>Target Profit</label><input type="number" id="target_profit" value="5.0" step="0.5"></div>
    </div>
    <div class="control"><label>Trend-to Period (years)</label><input type="number" id="trend_to_year" value="1.5" step="0.5"></div>
    <div class="control"><label>Seed</label><input type="number" id="seed" value="42"></div>

    <button class="btn" id="runBtn" onclick="runAnalysis()">Run Analysis</button>
  </div>

  <div class="main" id="mainContent">
    <div class="empty-state">
      <h2>Ready to Analyze</h2>
      <p>Configure parameters and click Run Analysis to simulate data and generate actuarial exhibits.</p>
    </div>
  </div>
</div>

<script>
let DATA = null;
let activeTab = 'summary';
let activeAvgFilters = {};
let chartInstances = {};
let selectedTrendFits = {}; // track selected fit index per chart section
let activeLdfMetrics = new Set(['paid', 'incurred']); // which triangles to show on LDF tab
let activeTrendMetrics = new Set(['loss', 'severity', 'frequency', 'premium']); // which trends to show

function val(id) { return document.getElementById(id).value; }
function numVal(id) { return parseFloat(val(id)); }

async function runAnalysis() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>Running...';
  const ldfWindow = val('ldf_window');

  const body = {
    seed: numVal('seed'), years: numVal('years'),
    base_year: numVal('base_year'), evaluation_year: numVal('base_year') + numVal('years'),
    base_policy_count: numVal('base_policy_count'), base_premium_per_policy: numVal('base_premium_per_policy'),
    exposure_growth_annual: numVal('exposure_growth_annual') / 100,
    premium_drift_annual: numVal('premium_drift_annual') / 100,
    base_frequency: numVal('base_frequency'),
    frequency_trend_annual: numVal('frequency_trend_annual') / 100,
    base_severity_mean: numVal('base_severity_mean'), severity_cv: numVal('severity_cv'),
    severity_trend_annual: numVal('severity_trend_annual') / 100,
    ldf_method: { window: ldfWindow === 'all' ? 'all' : parseInt(ldfWindow), type: val('ldf_type'), variant: val('ldf_variant') },
    tail_factor: numVal('tail_factor'),
    expense_ratio: numVal('expense_ratio') / 100, target_profit: numVal('target_profit') / 100,
    trend_to_year: numVal('trend_to_year'),
  };

  try {
    const resp = await fetch('/api/analyze', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    DATA = await resp.json();
    if (DATA.error) throw new Error(DATA.error);
    render();
  } catch (e) {
    document.getElementById('mainContent').innerHTML = `<div class="empty-state"><h2>Error</h2><p>${e.message}</p></div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Run Analysis';
  }
}

function selectTrendFit(sectionKey, fitIndex) {
  selectedTrendFits[sectionKey] = fitIndex;
  // Destroy just this chart and rebuild
  if (chartInstances[sectionKey]) { chartInstances[sectionKey].destroy(); delete chartInstances[sectionKey]; }
  // Re-render the whole trends tab to update table highlighting + chart
  render();
}

function destroyCharts() {
  for (const key of Object.keys(chartInstances)) {
    if (chartInstances[key]) { chartInstances[key].destroy(); delete chartInstances[key]; }
  }
}

function render() {
  destroyCharts();
  const main = document.getElementById('mainContent');
  const tabs = ['summary','ldf','trends','indications'];
  const tabLabels = { summary:'Summary', ldf:'LDF', trends:'Trends', indications:'Indications' };

  let html = '<div class="tabs">';
  for (const t of tabs) html += `<button class="tab ${t===activeTab?'active':''}" onclick="switchTab('${t}')">${tabLabels[t]}</button>`;
  html += '</div><div id="tabContent">' + renderTab(activeTab) + '</div>';
  main.innerHTML = html;

  // After DOM is set, initialize charts if on trends tab
  if (activeTab === 'trends') initTrendCharts();
}

function switchTab(tab) { activeTab = tab; render(); }

function renderTab(tab) {
  if (tab === 'summary') return renderSummary();
  if (tab === 'ldf') return renderLdfTab();
  if (tab === 'trends') return renderTrends();
  if (tab === 'indications') return renderIndications();
  return '';
}

function fmt(n, dec=0) { if (n==null) return ''; return n.toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }
function fmtPct(n) { if (n==null) return ''; return (n*100).toFixed(1)+'%'; }
function card(label,value) { return `<div class="card"><div class="card-label">${label}</div><div class="card-value">${value}</div></div>`; }
function cardColor(label,value,cls) { return `<div class="card"><div class="card-label">${label}</div><div class="card-value ${cls}">${value}</div></div>`; }

// ── Summary ──
function renderSummary() {
  const s = DATA.simulation.summary, ind = DATA.indication;
  const wic = ind.weighted_indicated_change, cls = wic>=0?'positive':'negative';
  let html = '<div class="cards">';
  html += card('Total Policies', fmt(s.years.reduce((a,y)=>a+y.policies,0)));
  html += card('Total Claims', fmt(s.total_claims));
  html += card('Claim Snapshots', fmt(s.total_claim_snapshots));
  html += card('Permissible LR', fmtPct(ind.permissible_loss_ratio));
  html += cardColor('Wtd Indicated Chg', fmtPct(wic), cls);
  html += cardColor('Avg Indicated Chg', fmtPct(ind.all_year_average_change), ind.all_year_average_change>=0?'positive':'negative');
  html += '</div>';

  html += '<div class="section-title">Simulation Summary by Year</div>';
  html += '<div class="table-wrap"><table><thead><tr><th>Year</th><th>Policies</th><th>Claims</th><th>Frequency</th><th>Ult Losses</th><th>Avg Severity</th><th>Earned Prem</th></tr></thead><tbody>';
  const policies = DATA.simulation.policies;
  for (let i=0; i<s.years.length; i++) {
    const y=s.years[i], p=policies[i];
    html += `<tr><td>${y.year}</td><td>${fmt(y.policies)}</td><td>${fmt(y.claims)}</td><td>${(y.claims/y.policies*100).toFixed(2)}%</td><td>${fmt(y.ultimate_losses)}</td><td>${y.claims>0?fmt(Math.round(y.ultimate_losses/y.claims)):'—'}</td><td>${fmt(Math.round(p.earned_premium))}</td></tr>`;
  }
  html += '</tbody></table></div>';

  html += '<div class="section-title">On-Level Factors</div>';
  html += '<div class="table-wrap"><table><thead><tr><th>Policy Year</th><th>On-Level Factor</th></tr></thead><tbody>';
  for (let i=0; i<DATA.on_level.policy_years.length; i++)
    html += `<tr><td>${DATA.on_level.policy_years[i]}</td><td>${fmt(DATA.on_level.on_level_factors[i],4)}</td></tr>`;
  html += '</tbody></table></div>';
  return html;
}

// ── Triangles ──
function renderTriangleTab(metric) {
  const triData = DATA.triangles[metric];
  if (!triData) return '<div class="empty-state">No data</div>';
  const tri = triData.triangle, fac = triData.factors;

  let html = `<div class="section-title">${metricLabel(metric)} Triangle</div>`;
  html += '<div class="table-wrap"><table><thead><tr><th>AY</th>';
  for (const d of tri.development_periods) html += `<th>${d}</th>`;
  html += '</tr></thead><tbody>';
  for (let i=0; i<tri.accident_years.length; i++) {
    html += `<tr><td>${tri.accident_years[i]}</td>`;
    for (let j=0; j<tri.development_periods.length; j++) html += `<td>${fmt(tri.values[i][j])}</td>`;
    html += '</tr>';
  }
  html += '</tbody></table></div>';

  html += `<div class="section-title">Age-to-Age Factors</div>`;
  html += renderFactorsTable(fac, tri.accident_years, metric);
  return html;
}

function renderFactorsTable(fac, accidentYears, metric) {
  const key = metric;
  if (!activeAvgFilters[key]) activeAvgFilters[key] = new Set(['All Vol Wtd','All Simple','All Vol Wtd Hi-Lo','4Q Vol Wtd','8Q Vol Wtd']);
  const activeSet = activeAvgFilters[key];
  const uniqueLabels = [...new Set(fac.averages.map(a=>a.label))];

  let html = '<div class="filter-bar">';
  for (const label of uniqueLabels) html += `<button class="filter-chip ${activeSet.has(label)?'active':''}" onclick="toggleAvgFilter('${key}','${label}')">${label}</button>`;
  html += '</div>';
  html += '<div class="table-wrap"><table><thead><tr><th></th>';
  for (const pl of fac.period_labels) html += `<th>${pl}</th>`;
  html += '</tr></thead><tbody>';

  for (let i=0; i<fac.factors_by_year.length; i++) {
    const label = i<accidentYears.length ? accidentYears[i] : i;
    html += `<tr><td>${label}</td>`;
    for (const f of fac.factors_by_year[i]) html += `<td>${f!=null?fmt(f,4):''}</td>`;
    html += '</tr>';
  }
  html += `<tr class="separator"><td colspan="${fac.period_labels.length+1}"></td></tr>`;
  for (const avg of fac.averages) {
    if (!activeSet.has(avg.label)) continue;
    html += `<tr class="avg-row"><td>${avg.label}</td>`;
    for (const v of avg.values) html += `<td>${v!=null?fmt(v,4):''}</td>`;
    html += '</tr>';
  }
  html += `<tr class="selected-row"><td>Selected</td>`;
  for (const s of fac.selected) html += `<td>${fmt(s,4)}</td>`;
  html += '</tr><tr class="cdf-row"><td>CDF</td>';
  for (const c of fac.cumulative_to_ultimate) html += `<td>${fmt(c,4)}</td>`;
  html += '</tr></tbody></table></div>';
  return html;
}

function toggleAvgFilter(key, label) {
  if (!activeAvgFilters[key]) activeAvgFilters[key] = new Set();
  const set = activeAvgFilters[key];
  if (set.has(label)) set.delete(label); else set.add(label);
  render();
}

function metricLabel(m) {
  return {paid:'Paid Loss',incurred:'Incurred Loss',paid_severity:'Paid Severity',incurred_severity:'Incurred Severity'}[m]||m;
}

function toggleLdfMetric(m) {
  if (activeLdfMetrics.has(m)) { if (activeLdfMetrics.size > 1) activeLdfMetrics.delete(m); }
  else activeLdfMetrics.add(m);
  render();
}

function toggleTrendMetric(m) {
  if (activeTrendMetrics.has(m)) { if (activeTrendMetrics.size > 1) activeTrendMetrics.delete(m); }
  else activeTrendMetrics.add(m);
  render();
}

function renderLdfTab() {
  const allMetrics = [
    { key:'paid', label:'Paid' },
    { key:'incurred', label:'Incurred' },
    { key:'paid_severity', label:'Paid Severity' },
    { key:'incurred_severity', label:'Incurred Severity' },
  ];
  let html = '<div class="toggle-bar">';
  for (const m of allMetrics) html += `<button class="toggle-pill ${activeLdfMetrics.has(m.key)?'on':''}" onclick="toggleLdfMetric('${m.key}')">${m.label}</button>`;
  html += '</div>';
  for (const m of allMetrics) {
    if (!activeLdfMetrics.has(m.key)) continue;
    html += renderTriangleTab(m.key);
  }
  return html;
}

// ── Trends Tab ──
const TREND_SECTIONS = [
  { key:'loss', title:'Total Loss Trend', yLabel:'Ultimate Losses', toggleLabel:'Loss' },
  { key:'severity', title:'Severity Trend', yLabel:'Average Severity', toggleLabel:'Severity' },
  { key:'frequency', title:'Frequency Trend', yLabel:'Claim Frequency', toggleLabel:'Frequency' },
  { key:'premium', title:'Premium Drift Trend', yLabel:'Premium per Policy', toggleLabel:'Premium' },
];

function renderTrends() {
  // Toggle bar
  let html = '<div class="toggle-bar">';
  for (const sec of TREND_SECTIONS) html += `<button class="toggle-pill ${activeTrendMetrics.has(sec.key)?'on':''}" onclick="toggleTrendMetric('${sec.key}')">${sec.toggleLabel}</button>`;
  html += '</div>';

  for (const sec of TREND_SECTIONS) {
    if (!activeTrendMetrics.has(sec.key)) continue;
    const fits = DATA.trend_fits[sec.key];
    if (!fits) continue;

    // Card wrapper
    html += '<div class="trend-card">';
    html += `<div class="section-title">${sec.title}</div>`;
    html += `<div class="chart-container"><canvas id="chart_${sec.key}"></canvas></div>`;

    // Determine which fit is currently selected
    const selIdx = selectedTrendFits[sec.key] != null ? selectedTrendFits[sec.key] : fits.findIndex(f => f.options.window === 'all' && f.options.variant === 'straight');
    if (selectedTrendFits[sec.key] == null) selectedTrendFits[sec.key] = selIdx >= 0 ? selIdx : 0;

    // Judgmental trend from sidebar inputs
    const judgmentalMap = {
      loss: () => (numVal('severity_trend_annual') + numVal('frequency_trend_annual')) / 100,
      severity: () => numVal('severity_trend_annual') / 100,
      frequency: () => numVal('frequency_trend_annual') / 100,
      premium: () => numVal('premium_drift_annual') / 100,
    };
    const judgTrend = judgmentalMap[sec.key] ? judgmentalMap[sec.key]() : 0;
    const judgSel = selectedTrendFits[sec.key] === -1 ? ' class="selected-trend-row"' : '';

    html += '<div class="table-wrap"><table><thead><tr><th>Method</th><th>Annual Trend</th><th>R²</th></tr></thead><tbody>';
    html += `<tr${judgSel} style="cursor:pointer" onclick="selectTrendFit('${sec.key}',-1)"><td>Judgmental</td><td>${fmtPct(judgTrend)}</td><td style="color:#8b90a5">—</td></tr>`;
    for (let fi = 0; fi < fits.length; fi++) {
      const f = fits[fi];
      const r2c = f.r_squared>0.9?'color:var(--green)':f.r_squared>0.7?'color:var(--orange)':'color:var(--red)';
      const selClass = fi === selectedTrendFits[sec.key] ? ' class="selected-trend-row"' : '';
      html += `<tr${selClass} style="cursor:pointer" onclick="selectTrendFit('${sec.key}',${fi})"><td>${f.label}</td><td>${fmtPct(f.annual_trend)}</td><td style="${r2c}">${f.r_squared.toFixed(4)}</td></tr>`;
    }
    html += '</tbody></table></div>';
    html += '</div>'; // end trend-card
  }
  return html;
}

function initTrendCharts() {
  for (const sec of TREND_SECTIONS) {
    if (!activeTrendMetrics.has(sec.key)) continue;
    const canvas = document.getElementById('chart_' + sec.key);
    if (!canvas) continue;

    const fits = DATA.trend_fits[sec.key];
    const rawData = (DATA.trend_data && DATA.trend_data[sec.key])
      ? DATA.trend_data[sec.key]
      : DATA.simulation.summary.years.map(y => ({
          year: y.year,
          value: sec.key === 'loss' ? y.ultimate_losses
               : sec.key === 'severity' ? (y.claims > 0 ? y.ultimate_losses / y.claims : 0)
               : sec.key === 'premium' ? (y.policies > 0 ? y.earned_premium / y.policies : 0)
               : y.claims / y.policies,
        }));
    if (!rawData || !fits || rawData.length === 0) continue;

    const years = rawData.map(d => d.year);
    const values = rawData.map(d => d.value);
    const minYear = Math.min(...years);
    const maxYear = Math.max(...years);
    const projYear = maxYear + 2;

    // Build integer x-axis labels from minYear to projYear
    const allYears = [];
    for (let y = minYear; y <= projYear; y++) allYears.push(y);

    // Find selected fit (All/straight)
    const selIdx = selectedTrendFits[sec.key] != null ? selectedTrendFits[sec.key] : 0;
    let selectedFit;
    if (selIdx === -1) {
      // Judgmental: build a synthetic fit from sidebar inputs
      const judgmentalMap = {
        loss: () => (numVal('severity_trend_annual') + numVal('frequency_trend_annual')) / 100,
        severity: () => numVal('severity_trend_annual') / 100,
        frequency: () => numVal('frequency_trend_annual') / 100,
        premium: () => numVal('premium_drift_annual') / 100,
      };
      selectedFit = { label: 'Judgmental', annual_trend: judgmentalMap[sec.key]() };
    } else {
      selectedFit = fits[selIdx] || fits[0];
    }

    // Predicted value helper: use intercept+slope if available, else derive from annual_trend + actuals
    const predict = (fit, x) => {
      if (fit.intercept != null && fit.slope != null && isFinite(fit.intercept) && isFinite(fit.slope)) {
        return Math.exp(fit.intercept + fit.slope * x);
      }
      // Fallback: anchor at mean of actuals, project with annual_trend
      const meanYear = years.reduce((a,b) => a+b, 0) / years.length;
      const meanVal = values.reduce((a,b) => a+b, 0) / values.length;
      return meanVal * Math.pow(1 + fit.annual_trend, x - meanYear);
    };

    // Filter fits with actual regression
    const validFits = fits.filter(f => f.annual_trend !== 0);

    // Anchor point: the most recent actual data value — all projections converge here
    const anchorValue = values[values.length - 1];
    // Project any fit from the anchor using its own annual trend
    const projectFromAnchor = (fit, x) => anchorValue * Math.pow(1 + fit.annual_trend, x - maxYear);

    // Compute envelope (min/max across ALL fits) — from maxYear onward
    const upperBand = allYears.map(x => {
      if (x < maxYear) return null;
      const preds = validFits.map(f => projectFromAnchor(f, x));
      return preds.length > 0 ? Math.max(...preds) : null;
    });
    const lowerBand = allYears.map(x => {
      if (x < maxYear) return null;
      const preds = validFits.map(f => projectFromAnchor(f, x));
      return preds.length > 0 ? Math.min(...preds) : null;
    });

    // Selected fit line: from maxYear through projection
    const projLine = allYears.map(x => x >= maxYear ? projectFromAnchor(selectedFit, x) : null);

    // Projection dots with values (only future years beyond actuals)
    const projPoints = allYears.map(x => x > maxYear ? projectFromAnchor(selectedFit, x) : null);

    // Actuals: only at data years, null elsewhere
    const actualPoints = allYears.map(x => {
      const idx = years.indexOf(x);
      return idx >= 0 ? values[idx] : null;
    });

    // High/low fits
    const sortedByTrend = [...validFits].sort((a, b) => a.annual_trend - b.annual_trend);
    const loFit = sortedByTrend.length > 0 ? sortedByTrend[0] : null;
    const hiFit = sortedByTrend.length > 1 ? sortedByTrend[sortedByTrend.length - 1] : null;

    const datasets = [
      // Confidence band upper (from extendBack, fill down to lower)
      {
        label: 'Confidence Band (All Fits)',
        data: upperBand,
        borderColor: 'rgba(108, 140, 255, 0.3)',
        backgroundColor: 'rgba(108, 140, 255, 0.10)',
        borderWidth: 1,
        fill: { target: 1, above: 'rgba(108, 140, 255, 0.10)', below: 'rgba(108, 140, 255, 0.10)' },
        pointRadius: 0,
        tension: 0,
        spanGaps: true,
        order: 10,
      },
      // Lower confidence band
      {
        label: '_lower',
        data: lowerBand,
        borderColor: 'rgba(108, 140, 255, 0.3)',
        backgroundColor: 'rgba(108, 140, 255, 0.10)',
        borderWidth: 1,
        fill: false,
        pointRadius: 0,
        tension: 0,
        spanGaps: true,
        order: 10,
      },
      // Selected trend line (dashed, from last actual point forward)
      {
        label: 'Selected: ' + selectedFit.label + ' (' + (selectedFit.annual_trend*100).toFixed(1) + '%/yr)',
        data: projLine,
        borderColor: '#6c8cff',
        backgroundColor: 'transparent',
        borderWidth: 2.5,
        borderDash: [8, 4],
        pointRadius: 0,
        tension: 0,
        spanGaps: true,
        order: 5,
      },
      // Projected value dots (future years only)
      {
        label: 'Projected',
        data: projPoints,
        borderColor: '#6c8cff',
        backgroundColor: '#6c8cff',
        pointRadius: 6,
        pointHoverRadius: 8,
        pointStyle: 'circle',
        showLine: false,
        order: 2,
      },
      // Actual data — connected line (not smoothed)
      {
        label: 'Actual',
        data: actualPoints,
        borderColor: '#4ade80',
        backgroundColor: '#4ade80',
        borderWidth: 2,
        pointRadius: 5,
        pointHoverRadius: 7,
        pointStyle: 'circle',
        tension: 0,
        spanGaps: false,
        order: 1,
      },
    ];

    // Low fit line — from last actual point, fans out
    if (loFit) {
      const loLine = allYears.map(x => x >= maxYear ? projectFromAnchor(loFit, x) : null);
      datasets.push({
        label: 'Low: ' + loFit.label + ' (' + (loFit.annual_trend*100).toFixed(1) + '%/yr)',
        data: loLine,
        borderColor: 'rgba(74, 222, 128, 0.5)',
        backgroundColor: 'transparent',
        borderWidth: 1.5,
        borderDash: [4, 3],
        pointRadius: 0,
        tension: 0,
        spanGaps: true,
        order: 8,
      });
    }

    // High fit line — from last actual point, fans out
    if (hiFit && hiFit !== loFit) {
      const hiLine = allYears.map(x => x >= maxYear ? projectFromAnchor(hiFit, x) : null);
      datasets.push({
        label: 'High: ' + hiFit.label + ' (' + (hiFit.annual_trend*100).toFixed(1) + '%/yr)',
        data: hiLine,
        borderColor: 'rgba(248, 113, 113, 0.5)',
        backgroundColor: 'transparent',
        borderWidth: 1.5,
        borderDash: [4, 3],
        pointRadius: 0,
        tension: 0,
        spanGaps: true,
        order: 8,
      });
    }

    const yLabel = sec.yLabel;
    const isFreq = sec.key === 'frequency';

    chartInstances[sec.key] = new Chart(canvas, {
      type: 'line',
      data: {
        labels: allYears,
        datasets: datasets,
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          filler: { propagate: true },
          legend: {
            labels: {
              color: '#8b90a5',
              font: { family: "'SF Mono','Cascadia Code','Consolas',monospace", size: 11 },
              filter: (item) => !item.text.startsWith('_'),
              usePointStyle: true,
            },
          },
          tooltip: {
            backgroundColor: '#1a1d27',
            titleColor: '#e1e4ed',
            bodyColor: '#e1e4ed',
            borderColor: '#2e3347',
            borderWidth: 1,
            titleFont: { family: "'SF Mono','Consolas',monospace", size: 12 },
            bodyFont: { family: "'SF Mono','Consolas',monospace", size: 11 },
            filter: (item) => !item.dataset.label.startsWith('_'),
            callbacks: {
              label: (ctx) => {
                if (ctx.dataset.label.startsWith('_')) return null;
                if (ctx.parsed.y == null) return null;
                const v = ctx.parsed.y;
                return ctx.dataset.label + ': ' + (isFreq ? v.toFixed(4) : v.toLocaleString('en-US', {maximumFractionDigits:0}));
              },
            },
          },
        },
        scales: {
          x: {
            title: { display: true, text: 'Year', color: '#8b90a5', font: { size: 11 } },
            ticks: { color: '#8b90a5', font: { family: "'SF Mono','Consolas',monospace", size: 10 } },
            grid: { color: 'rgba(46,51,71,0.5)' },
          },
          y: {
            title: { display: true, text: yLabel, color: '#8b90a5', font: { size: 11 } },
            ticks: {
              color: '#8b90a5',
              font: { family: "'SF Mono','Consolas',monospace", size: 10 },
              callback: (v) => isFreq ? v.toFixed(3) : v.toLocaleString('en-US', {maximumFractionDigits:0}),
            },
            grid: { color: 'rgba(46,51,71,0.5)' },
          },
        },
      },
      plugins: [{
        id: 'projectionLine',
        beforeDraw: (chart) => {
          const meta = chart.getDatasetMeta(0);
          if (!meta || !meta.data) return;
          // Find the pixel position for the last actual data year
          const lastDataIdx = allYears.indexOf(maxYear);
          if (lastDataIdx < 0) return;
          const xPixel = meta.data[lastDataIdx] ? meta.data[lastDataIdx].x : null;
          if (xPixel == null) return;
          const yScale = chart.scales.y;
          const ctx = chart.ctx;
          ctx.save();
          ctx.strokeStyle = 'rgba(142,142,170,0.35)';
          ctx.lineWidth = 1;
          ctx.setLineDash([5, 3]);
          ctx.beginPath();
          ctx.moveTo(xPixel, yScale.top);
          ctx.lineTo(xPixel, yScale.bottom);
          ctx.stroke();
          ctx.restore();
          ctx.save();
          ctx.fillStyle = '#8b90a5';
          ctx.font = '10px SF Mono, Consolas, monospace';
          ctx.textAlign = 'left';
          ctx.fillText('Projection', xPixel + 6, yScale.top + 12);
          ctx.restore();
        },
      }],
    });
  }
}

// ── Indications ──
function renderIndications() {
  const ind = DATA.indication, inp = DATA.indication_inputs;
  const wic = ind.weighted_indicated_change, cls = wic>=0?'positive':'negative';

  let html = '<div class="cards">';
  html += card('Expense Ratio', fmtPct(inp.expense_ratio));
  html += card('Target Profit', fmtPct(inp.target_profit_and_contingency));
  html += card('Permissible LR', fmtPct(ind.permissible_loss_ratio));
  html += card('Loss Trend', fmtPct(inp.loss_trend_annual));
  html += cardColor('Wtd Indicated Chg', fmtPct(wic), cls);
  html += cardColor('Avg Indicated Chg', fmtPct(ind.all_year_average_change), ind.all_year_average_change>=0?'positive':'negative');
  html += '</div>';

  html += '<div class="section-title">Rate Level Indication Exhibit</div>';
  html += '<div class="table-wrap"><table><thead><tr><th>AY</th><th>Reported</th><th>LDF</th><th>Ultimate</th><th>Trend Fct</th><th>Trnd Ult</th><th>Earned Prem</th><th>OL Fct</th><th>OL Prem</th><th>Loss Ratio</th><th>Ind Change</th></tr></thead><tbody>';
  for (const r of ind.results) {
    const chgCls = r.indicated_rate_change>=0?'color:var(--red)':'color:var(--green)';
    html += `<tr><td>${r.accident_year}</td><td>${fmt(r.reported_losses)}</td><td>${fmt(r.development_factor,4)}</td><td>${fmt(r.ultimate_losses)}</td><td>${fmt(r.loss_trend_factor,4)}</td><td>${fmt(r.trended_ultimate_losses)}</td><td>${fmt(r.earned_premium)}</td><td>${fmt(r.on_level_factor,4)}</td><td>${fmt(r.on_level_premium)}</td><td>${fmtPct(r.expected_loss_ratio)}</td><td style="${chgCls};font-weight:700">${fmtPct(r.indicated_rate_change)}</td></tr>`;
  }
  html += '</tbody></table></div>';

  html += '<div class="section-title">Development to Ultimate</div>';
  html += '<div class="table-wrap"><table><thead><tr><th>AY</th><th>Latest Reported</th><th>Dev Period</th><th>CDF</th><th>Ultimate</th></tr></thead><tbody>';
  for (const u of DATA.ultimates)
    html += `<tr><td>${u.accident_year}</td><td>${fmt(u.latest_reported)}</td><td>${u.development_period}</td><td>${fmt(u.cdf,4)}</td><td>${fmt(u.ultimate)}</td></tr>`;
  html += '</tbody></table></div>';
  return html;
}

window.addEventListener('DOMContentLoaded', () => {
  runAnalysis();
  // Re-render trends chart when sidebar trend inputs change (for Judgmental selection)
  for (const id of ['frequency_trend_annual', 'severity_trend_annual', 'premium_drift_annual']) {
    document.getElementById(id).addEventListener('input', () => {
      if (DATA && activeTab === 'trends') render();
    });
  }
});
